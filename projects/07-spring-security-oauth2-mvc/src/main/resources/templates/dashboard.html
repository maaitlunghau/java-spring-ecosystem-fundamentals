<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <span class="navbar-brand fw-bold">OAuth2 Demo</span>
    <div class="ms-auto d-flex align-items-center gap-3">
        <span class="text-white-50 small" sec:authentication="name">username</span>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-outline-light btn-sm">Sign out</button>
        </form>
    </div>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body p-4 text-center">

                    <img th:if="${user.avatarUrl != null}"
                         th:src="${user.avatarUrl}"
                         class="rounded-circle mb-3"
                         width="80" height="80"
                         alt="Avatar">

                    <h5 class="fw-bold mb-1" th:text="${user.name}">Name</h5>
                    <p class="text-muted mb-1" th:text="${user.email}">email@example.com</p>
                    <span class="badge bg-secondary mb-3" th:text="${user.provider}">PROVIDER</span>

                    <hr>

                    <div class="text-start">
                        <div class="row mb-2">
                            <div class="col-4 text-muted small">ID</div>
                            <div class="col-8 small" th:text="${user.id}">1</div>
                        </div>
                        <div class="row mb-2">
                            <div class="col-4 text-muted small">Provider ID</div>
                            <div class="col-8 small text-truncate" th:text="${user.providerId}">xxx</div>
                        </div>
                        <div class="row mb-2">
                            <div class="col-4 text-muted small">Role</div>
                            <div class="col-8 small" th:text="${user.role}">USER</div>
                        </div>
                        <div class="row">
                            <div class="col-4 text-muted small">Joined</div>
                            <div class="col-8 small" th:text="${#temporals.format(user.createdAt, 'dd/MM/yyyy HH:mm')}">date</div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
