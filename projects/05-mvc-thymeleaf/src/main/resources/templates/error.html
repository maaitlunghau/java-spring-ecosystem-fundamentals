<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <title>Error</title>

        body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 0 20px; }
        .alert { background: #fee2e2; border: 1px solid #fca5a5; padding: 16px 20px; border-radius: 4px; color: #b91c1c; }

</head>

<h1>Something went wrong</h1>

</body>
</html>
